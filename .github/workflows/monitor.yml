name: Notification Monitor

# Runs daily and on manual trigger. Commits updated state + report back to the
# repo, then publishes docs/ to GitHub Pages.
on:
  schedule:
    - cron: "54 */1 * * *"      # 04:07 UTC daily. Adjust as needed.
  workflow_dispatch: {}        # lets you run it on demand from the Actions tab

permissions:
  contents: write              # to commit state.json + report back
  pages: write                 # to deploy to GitHub Pages
  id-token: write              # required by the Pages deploy action

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so push-rebase can integrate remote changes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Playwright is only needed if/when a site uses the playwright_table
      # fetcher. ePing does not. Uncomment the next two lines when you add one.
      # - name: Install Playwright browser
      #   run: python -m playwright install --with-deps chromium

      - name: Gemini diagnostic (non-fatal)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        continue-on-error: true        # never blocks the run; just prints info
        run: |
          mkdir -p _logs
          # tee: print to the live log AND save to a file we upload as an artifact.
          {
            MODEL="${GEMINI_MODEL:-gemini-2.5-flash}"
            echo "=== Is the key present? (length only, not the value) ==="
            echo "GEMINI_API_KEY length: ${#GEMINI_API_KEY}"
            if [ -z "$GEMINI_API_KEY" ]; then
              echo "KEY IS EMPTY — the secret is not reaching this job."
            fi
            echo "=== Raw curl call to model: $MODEL (this WILL show in AI Studio if it leaves the runner) ==="
            curl -sS -w "\nHTTP_STATUS:%{http_code}\n" \
              "https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent" \
              -H "Content-Type: application/json" \
              -H "x-goog-api-key: ${GEMINI_API_KEY}" \
              -d '{"contents":[{"parts":[{"text":"Reply with the single word OK"}]}]}' || true
            echo ""
            echo "=== Which models can this key use? (Python helper) ==="
            python summarizer.py --list || true
            echo "=== Python self-test ==="
            python summarizer.py || true
          } 2>&1 | tee _logs/gemini_diagnostic.txt

      - name: Run monitor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # optional; safe if unset
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}           # optional override
        run: |
          mkdir -p _logs
          python monitor.py 2>&1 | tee _logs/monitor_run.txt

      - name: Write run summary
        if: always()
        run: |
          {
            echo "## Notification Monitor — run summary"
            echo ""
            echo "### Per-site result"
            echo '```'
            grep -E "^\s*\[" _logs/monitor_run.txt || echo "(no per-site lines found)"
            echo '```'
            echo "### Gemini diagnostic (key/model/HTTP status)"
            echo '```'
            grep -E "length:|HTTP_STATUS|OK:|FAILED:|\[summarizer\]" _logs/gemini_diagnostic.txt 2>/dev/null || echo "(no diagnostic captured)"
            echo '```'
            echo "_Full logs and report are in the **run-diagnostics** artifact on this page._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostics artifact (always)
        if: always()                   # upload even if a prior step failed
        uses: actions/upload-artifact@v4
        with:
          name: run-diagnostics
          retention-days: 14
          path: |
            _logs/
            docs/report.html
            docs/report_data.json
            state/state.json

      - name: Commit updated state and report
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          # The monitor only writes these files; rebasing onto remote keeps any
          # other changes (e.g. your manual edits) instead of clobbering them.
          git config pull.rebase true

          git add state/state.json docs/report.html docs/report_data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update notifications $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Push with rebase-and-retry: if remote moved between checkout and now
          # (manual edits, overlapping runs), pull --rebase and try again.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto remote and retrying..."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          done
          echo "::error::Failed to push after 3 attempts."
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
