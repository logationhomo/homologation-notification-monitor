<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification Monitor — Latest Updates</title>
<style>
  /* Real report — master-detail (v3.2 UI), data-driven.
     Thin shell: fetches report_data.json; JS renders list + detail.
     An adapter maps the pipeline schema (entry.meta dict, new-only
     entries) to the UI shape. Severity from the structured LLM field;
     "unknown" renders as neutral grey. */
  :root {
    --bg: #f4f5f7; --panel: #ffffff; --ink: #14171d; --muted: #5c6472; --faint: #8a909c;
    --line: #e2e5ea; --line-strong: #cfd4dc; --accent: #1f5fbf; --accent-soft: #e9f0fb; --new: #0a7d33;
    --hi: #c0392b; --hi-bg: #fbe9e7; --hi-line: #c0392b;
    --mod: #b9770a; --mod-bg: #fdf3e3; --mod-line: #d99a2b;
    --low: #5b6472; --low-bg: #eef1f5; --low-line: #b6bcc7;
    --unk: #8a909c; --unk-bg: #eef1f5; --unk-line: #c2c8d0;
    --urgent: #c0392b; --urgent-bg: #fbe9e7; --soon: #b9770a; --soon-bg: #fdf3e3; --calm: #5c6472;
    --chip: #eef1f5; --radius: 7px;
    --mono: "SF Mono","JetBrains Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --sb-thumb: rgba(20,23,29,.18); --sb-thumb-hover: rgba(20,23,29,.30); --sb-thumb-active: rgba(20,23,29,.42);
  }
  [data-theme="dark"] {
    --bg: #0f1115; --panel: #171a21; --ink: #e7e9ee; --muted: #9aa2b1; --faint: #6b7280;
    --line: #262b34; --line-strong: #3a414d; --accent: #6ea2f0; --accent-soft: #18243a; --new: #5fce86;
    --hi: #f0837a; --hi-bg: #3a1f1c; --hi-line: #e0675c;
    --mod: #e0b15f; --mod-bg: #352a16; --mod-line: #c8923a;
    --low: #99a2b3; --low-bg: #21262f; --low-line: #4a525f;
    --unk: #99a2b3; --unk-bg: #21262f; --unk-line: #4a525f;
    --urgent: #f0837a; --urgent-bg: #3a1f1c; --soon: #e0b15f; --soon-bg: #352a16; --calm: #9aa2b1;
    --chip: #21262f;
    --sb-thumb: rgba(231,233,238,.16); --sb-thumb-hover: rgba(231,233,238,.28); --sb-thumb-active: rgba(231,233,238,.40);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--ink); font: 14px/1.5 var(--sans); display: flex; flex-direction: column; overflow: hidden; }

  .listscroll, .detailpane { scrollbar-width: thin; scrollbar-color: var(--sb-thumb) transparent; }
  .listscroll::-webkit-scrollbar, .detailpane::-webkit-scrollbar { width: 10px; height: 10px; }
  .listscroll::-webkit-scrollbar-track, .detailpane::-webkit-scrollbar-track { background: transparent; }
  .listscroll::-webkit-scrollbar-thumb, .detailpane::-webkit-scrollbar-thumb { background: var(--sb-thumb); border-radius: 999px; border: 3px solid transparent; background-clip: padding-box; }
  .listscroll:hover::-webkit-scrollbar-thumb, .detailpane:hover::-webkit-scrollbar-thumb { background: var(--sb-thumb-hover); background-clip: padding-box; }
  .listscroll::-webkit-scrollbar-thumb:hover, .detailpane::-webkit-scrollbar-thumb:hover { background: var(--sb-thumb-active); background-clip: padding-box; }

  header.top { padding: 14px 20px 12px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  header.top h1 { font-size: 1.18rem; margin: 0; font-weight: 680; letter-spacing: -.015em; }
  header.top .subhead { color: var(--muted); font-size: .82rem; }
  header.top .subhead b { color: var(--ink); }
  header.top .spacer { flex: 1; }
  .theme-btn { border: 1px solid var(--line-strong); background: var(--panel); color: var(--ink); border-radius: var(--radius); padding: 6px 12px; font-size: .78rem; cursor: pointer; font-family: var(--sans); }
  .theme-btn:hover { border-color: var(--accent); }

  .shell { display: grid; grid-template-columns: minmax(0, 1fr) 0fr; flex: 1; min-height: 0; transition: grid-template-columns .22s ease; }
  body.detail-open .shell { grid-template-columns: minmax(380px, 460px) 1fr; }

  .listpane { border-right: 1px solid transparent; display: flex; flex-direction: column; min-height: 0; background: var(--bg); min-width: 0; }
  body.detail-open .listpane { border-right-color: var(--line); }
  .listinner { width: 100%; max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; min-height: 0; flex: 1; }
  body.detail-open .listinner { max-width: none; margin: 0; }

  .filterbar { padding: 12px 14px; border-bottom: 1px solid var(--line); background: var(--bg); position: sticky; top: 0; z-index: 5; }
  .search { position: relative; margin-bottom: 9px; }
  .search input { width: 100%; padding: 8px 10px 8px 32px; font-size: .86rem; font-family: var(--sans); border: 1px solid var(--line-strong); border-radius: var(--radius); background: var(--panel); color: var(--ink); }
  .search input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  .search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--faint); }
  .filt-row { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .segmented { display: inline-flex; border: 1px solid var(--line-strong); border-radius: var(--radius); overflow: hidden; }
  .segmented button { border: 0; background: var(--panel); color: var(--muted); padding: 6px 10px; font-size: .76rem; cursor: pointer; font-family: var(--sans); border-right: 1px solid var(--line-strong); font-weight: 550; }
  .segmented button:last-child { border-right: 0; }
  .segmented button[aria-pressed="true"] { color: #fff; }
  .segmented button[data-sev="all"][aria-pressed="true"] { background: var(--accent); }
  .segmented button[data-sev="high"][aria-pressed="true"] { background: var(--hi); }
  .segmented button[data-sev="moderate"][aria-pressed="true"] { background: var(--mod); }
  .segmented button[data-sev="low"][aria-pressed="true"] { background: var(--low); }
  select { padding: 6px 8px; font-size: .78rem; font-family: var(--sans); border: 1px solid var(--line-strong); border-radius: var(--radius); background: var(--panel); color: var(--ink); cursor: pointer; }
  select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .resultcount { font-size: .78rem; color: var(--muted); margin-left: auto; font-weight: 550; }
  .resultcount b { color: var(--ink); }

  .listscroll { overflow-y: auto; overscroll-behavior: contain; overflow-anchor: none; flex: 1; min-height: 0; padding: 4px 14px 28px; }
  body.detail-open .listscroll { padding: 4px 10px 28px; }

  .source-head { display: flex; align-items: baseline; gap: 8px; padding: 16px 4px 4px; }
  .source-head h2 { font-size: .92rem; margin: 0; font-weight: 680; letter-spacing: -.01em; }
  .source-head .count { font-size: .68rem; color: var(--muted); background: var(--chip); padding: 1px 7px; border-radius: 20px; margin-left: auto; font-weight: 550; }
  .country-label { font-size: .7rem; font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: .04em; padding: 9px 4px 4px; }

  .row { display: grid; grid-template-columns: 4px 1fr; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 5px; cursor: pointer; overflow: hidden; transition: border-color .1s, background .1s; }
  .row:hover { border-color: var(--line-strong); }
  .row[aria-selected="true"] { border-color: var(--accent); background: var(--accent-soft); }
  .row .rrail { width: 4px; }
  .row .rrail.high { background: var(--hi-line); }
  .row .rrail.moderate { background: var(--mod-line); }
  .row .rrail.low { background: var(--low-line); }
  .row .rrail.unknown { background: var(--unk-line); }
  .row .rmain { padding: 9px 11px; min-width: 0; }
  .row .rtop { display: flex; align-items: center; gap: 8px; }
  .sev { font-size: .64rem; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex: none; }
  .sev.high { background: var(--hi-bg); color: var(--hi); }
  .sev.moderate { background: var(--mod-bg); color: var(--mod); }
  .sev.low { background: var(--low-bg); color: var(--low); }
  .sev.unknown { background: var(--unk-bg); color: var(--unk); }
  .row .rpreview { color: var(--muted); font-size: .82rem; line-height: 1.45; margin: 5px 0 0; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  body.detail-open .row .rpreview { display: none; }
  .newdot { width: 7px; height: 7px; border-radius: 50%; background: var(--new); flex: none; margin-left: auto; }
  .row .rtitle { font-size: .88rem; font-weight: 600; line-height: 1.3; margin: 6px 0 0; }
  body.detail-open .row .rtitle { font-size: .86rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .row .rglance { display: flex; gap: 9px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
  .row .rglance .gc { font-size: .72rem; color: var(--faint); }
  .deadline { font-size: .68rem; font-weight: 650; padding: 1px 7px; border-radius: 20px; white-space: nowrap; }
  .deadline.urgent { background: var(--urgent-bg); color: var(--urgent); }
  .deadline.soon { background: var(--soon-bg); color: var(--soon); }
  .deadline.calm { color: var(--calm); }
  .deadline.passed { color: var(--faint); text-decoration: line-through; }

  .history-note { font-size: .76rem; color: var(--faint); font-style: italic; padding: 12px 4px 4px; margin-top: 8px; border-top: 1px solid var(--line); }

  .detailpane { overflow-y: auto; overscroll-behavior: contain; min-height: 0; min-width: 0; }
  .detail-inner { max-width: 680px; padding: 22px 32px 48px; }
  .d-closebar { display: flex; align-items: center; justify-content: flex-end; padding: 12px 16px 0; }
  .close-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--line-strong); color: var(--muted); border-radius: var(--radius); padding: 6px 12px; font-size: .8rem; font-weight: 600; cursor: pointer; font-family: var(--sans); }
  .close-btn:hover { border-color: var(--accent); color: var(--accent); }
  .d-eyebrow { display: flex; align-items: center; gap: 9px; margin-bottom: 12px; flex-wrap: wrap; }
  .d-source { font-size: .76rem; color: var(--muted); font-weight: 600; }
  .d-source::after { content: "·"; margin-left: 9px; color: var(--faint); }
  .d-country { font-size: .76rem; color: var(--muted); font-weight: 600; }
  .d-newdot { display: inline-flex; align-items: center; gap: 5px; font-size: .72rem; font-weight: 600; color: var(--new); margin-left: auto; }
  .d-newdot::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--new); }
  .d-title { font-size: 1.5rem; line-height: 1.25; font-weight: 700; margin: 0 0 14px; letter-spacing: -.015em; }
  .d-badges { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
  .d-sev { font-size: .74rem; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; padding: 4px 11px; border-radius: 5px; }
  .d-sev.high { background: var(--hi-bg); color: var(--hi); }
  .d-sev.moderate { background: var(--mod-bg); color: var(--mod); }
  .d-sev.low { background: var(--low-bg); color: var(--low); }
  .d-sev.unknown { background: var(--unk-bg); color: var(--unk); }
  .d-deadline { font-size: .8rem; font-weight: 650; padding: 4px 12px; border-radius: 20px; }
  .d-deadline.urgent { background: var(--urgent-bg); color: var(--urgent); }
  .d-deadline.soon { background: var(--soon-bg); color: var(--soon); }
  .d-deadline.calm { color: var(--calm); border: 1px solid var(--line-strong); }
  .d-deadline.passed { color: var(--faint); border: 1px solid var(--line); text-decoration: line-through; }
  .d-llm { background: var(--low-bg); border-left: 3px solid var(--accent); border-radius: 6px; padding: 16px 18px; margin: 0 0 24px; }
  .d-llm .lab { display: block; font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 7px; }
  .d-llm p { margin: 0; font-size: .96rem; line-height: 1.6; }
  .d-llm.muted { border-left-color: var(--faint); }
  .d-llm.muted .lab { color: var(--faint); }
  .d-meta { margin: 0 0 26px; }
  .d-meta h3 { font-size: .72rem; letter-spacing: .08em; text-transform: uppercase; color: var(--faint); font-weight: 700; margin: 0 0 10px; }
  dl.meta { display: grid; grid-template-columns: max-content 1fr; gap: 9px 20px; margin: 0; }
  dl.meta dt { color: var(--muted); font-size: .82rem; }
  dl.meta dd { margin: 0; font-size: .84rem; font-family: var(--mono); word-break: break-word; }
  .d-links { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .d-links a.primary { background: var(--accent); color: #fff; text-decoration: none; font-weight: 600; font-size: .85rem; padding: 9px 18px; border-radius: var(--radius); }
  .d-links a.primary:hover { opacity: .9; }
  .d-links a.secondary { color: var(--accent); text-decoration: none; font-weight: 600; font-size: .85rem; padding: 9px 6px; }
  .d-links a.secondary:hover { text-decoration: underline; }
  .d-share { margin-left: auto; font-size: .76rem; color: var(--faint); background: none; border: 1px solid var(--line-strong); border-radius: var(--radius); padding: 8px 12px; cursor: pointer; font-family: var(--sans); }
  .d-share:hover { border-color: var(--accent); color: var(--accent); }

  .status { padding: 40px 24px; text-align: center; color: var(--muted); font-size: .9rem; }
  .status.error { color: var(--hi); }

  @media (max-width: 720px) {
    .shell, body.detail-open .shell { grid-template-columns: 1fr; position: relative; }
    .listinner, body.detail-open .listinner { max-width: none; margin: 0; }
    .detailpane { position: absolute; inset: 0; background: var(--bg); z-index: 40; display: none; }
    body.detail-open .detailpane { display: block; }
    body.detail-open .listpane { display: none; }
    .detail-inner { padding: 8px 18px 40px; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body data-theme="light">
  <header class="top">
    <h1>Notification Monitor</h1>
    <span class="subhead" id="subhead">Loading…</span>
    <span class="spacer"></span>
    <button class="theme-btn" id="theme" type="button">Dark</button>
  </header>

  <div class="shell" id="shell">
    <section class="listpane" aria-label="Notifications list">
      <div class="listinner">
        <div class="filterbar">
          <div class="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input id="q" type="search" placeholder="Search titles, countries, symbols…" autocomplete="off">
          </div>
          <div class="filt-row">
            <div class="segmented" id="sevfilter" role="group" aria-label="Filter by impact">
              <button data-sev="all" aria-pressed="true">All</button>
              <button data-sev="high" aria-pressed="false">High</button>
              <button data-sev="moderate" aria-pressed="false">Mod</button>
              <button data-sev="low" aria-pressed="false">Low</button>
            </div>
            <select id="country"><option value="all">All countries</option></select>
            <span class="resultcount" id="resultcount"></span>
          </div>
        </div>
        <div class="listscroll" id="listscroll"><div class="status" id="status">Loading notifications…</div></div>
      </div>
    </section>

    <section class="detailpane" id="detailpane" aria-label="Notification detail">
      <div class="d-closebar"><button class="close-btn" id="closebtn" type="button">✕ Close</button></div>
      <div class="detail-inner" id="detailinner"></div>
    </section>
  </div>

<script>
/* Data load + schema adapter. report_data.json carries ONLY new entries,
   each with a `meta` dict. We adapt to the flat shape the UI uses. */
const $ = (s, r=document) => r.querySelector(s);
const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const VALID_SEV = new Set(["high","moderate","low","unknown"]);
const state = { q:"", sev:"all", country:"all", selected:null };
let DATA = { generated_at:"", sites:[] };
let INDEX = {};

function adaptEntry(e) {
  const meta = e.meta || {};
  let sev = (e.severity || "unknown").toLowerCase();
  if (!VALID_SEV.has(sev)) sev = "unknown";
  return {
    uid: String(e.uid),
    title: e.title || "(untitled notification)",
    severity: sev,
    country: meta["Notifying member"] || "—",
    seen_date: meta["Distribution date"] || "",
    deadline: meta["Comment deadline"] || "",
    note: e.llm_note || "",
    summary: e.summary || "",
    symbols: meta["Document symbol(s)"] || "",
    products: meta["Products"] || "",
    objectives: meta["Objectives"] || "",
    link: e.link || "",
    extra: e.extra_link || "",
    is_new: true,
  };
}

function todayUTC() { const n = new Date(); return new Date(Date.UTC(n.getUTCFullYear(), n.getUTCMonth(), n.getUTCDate())); }
const TODAY = todayUTC();

function deadlineInfo(iso) {
  if (!iso) return null;
  const d = new Date(iso + "T00:00:00Z");
  if (isNaN(d)) return null;
  const days = Math.round((d - TODAY) / 86400000);
  if (days < 0)   return { cls:"passed", label:`closed ${esc(iso)}` };
  if (days === 0) return { cls:"urgent", label:"due today" };
  if (days <= 7)  return { cls:"urgent", label:`due in ${days} day${days===1?"":"s"}` };
  if (days <= 21) return { cls:"soon",   label:`due in ${days} days` };
  return { cls:"calm", label:`due ${esc(iso)}` };
}
function firstSentence(t){ if(!t) return ""; const m = t.match(/^.*?[.!?](\s|$)/); return m ? m[0].trim() : t; }

const allCountries = () => { const s=new Set(); DATA.sites.forEach(x=>x.entries.forEach(e=>s.add(e.country))); return [...s].sort(); };
const totalNew = () => DATA.sites.reduce((n,s)=>n+s.entries.length,0);

function entryMatches(e) {
  if (state.sev !== "all" && e.severity !== state.sev) return false;
  if (state.country !== "all" && e.country !== state.country) return false;
  if (state.q) { const hay=(e.title+" "+e.country+" "+e.symbols+" "+e.note+" "+e.products+" "+e.summary).toLowerCase(); if(!hay.includes(state.q.toLowerCase())) return false; }
  return true;
}

function renderList() {
  const root = $("#listscroll"); root.innerHTML = "";
  const visibleByUid = new Set();
  let shown = 0;

  if (!DATA.sites.length || totalNew() === 0) {
    root.innerHTML = `<div class="status">No new notifications since the last check.</div>`;
    $("#resultcount").innerHTML = `<b>0</b> shown`;
    if (state.selected) closeDetail();
    return;
  }

  DATA.sites.forEach(site => {
    const visible = site.entries.filter(entryMatches);
    if (!visible.length) return;
    visible.forEach(e=>visibleByUid.add(e.uid));
    shown += visible.length;

    const head = document.createElement("div"); head.className="source-head";
    head.innerHTML = `<h2>${esc(site.name)}</h2><span class="count">${site.entries.length} new</span>`;
    root.appendChild(head);

    const byCountry = {}; visible.forEach(e=>(byCountry[e.country] ||= []).push(e));
    Object.keys(byCountry).sort().forEach(country => {
      const lbl = document.createElement("div"); lbl.className="country-label"; lbl.textContent=country;
      root.appendChild(lbl);
      byCountry[country].forEach(e => root.appendChild(rowEl(e)));
    });
  });

  if (shown === 0) {
    root.innerHTML = `<div class="status">No notifications match the current filters.</div>`;
  } else {
    const note = document.createElement("div");
    note.className = "history-note";
    note.textContent = "Showing changes since the last check. Older items are not retained here.";
    root.appendChild(note);
  }

  $("#resultcount").innerHTML = `<b>${shown}</b> shown`;
  if (state.selected && !visibleByUid.has(state.selected)) closeDetail();
  else reflectSelection();
}

function rowEl(e) {
  const el = document.createElement("div");
  el.className = "row"; el.dataset.uid = e.uid; el.setAttribute("role","button");
  el.setAttribute("aria-selected", state.selected===e.uid ? "true":"false");
  const dl = deadlineInfo(e.deadline);
  el.innerHTML =
    `<div class="rrail ${e.severity}"></div>
     <div class="rmain">
       <div class="rtop">
         <span class="sev ${e.severity}">${e.severity}</span>
         ${e.is_new ? '<span class="newdot" title="New"></span>' : ''}
       </div>
       <div class="rtitle">${esc(e.title)}</div>
       ${e.note ? `<div class="rpreview">${esc(firstSentence(e.note))}</div>` : ''}
       <div class="rglance">
         <span class="gc">${esc(e.country)}</span>
         ${dl ? `<span class="deadline ${dl.cls}">${dl.label}</span>` : ''}
       </div>
     </div>`;
  el.addEventListener("click", ()=>select(e.uid));
  return el;
}

function select(uid) {
  if (!INDEX[uid]) return;
  const opening = !document.body.classList.contains("detail-open");
  const scroller = $("#listscroll");
  let savedViewportOffset = null;
  if (opening && scroller) {
    const el = scroller.querySelector(`.row[data-uid="${CSS.escape(uid)}"]`);
    if (el) savedViewportOffset = el.getBoundingClientRect().top - scroller.getBoundingClientRect().top;
  }

  state.selected = uid;
  document.body.classList.add("detail-open");
  if (history.replaceState) history.replaceState(null, "", "#uid=" + encodeURIComponent(uid));
  else location.hash = "uid=" + encodeURIComponent(uid);
  reflectSelection();
  renderDetail();

  if (opening && scroller && savedViewportOffset != null) {
    const reanchor = () => {
      const el = scroller.querySelector(`.row[data-uid="${CSS.escape(uid)}"]`);
      if (!el) return;
      const nowOffset = el.getBoundingClientRect().top - scroller.getBoundingClientRect().top;
      scroller.scrollTop += (nowOffset - savedViewportOffset);
    };
    void scroller.offsetHeight;
    reanchor();
    const shell = $("#shell");
    const onEnd = (ev) => { if (ev.propertyName === "grid-template-columns") { reanchor(); shell.removeEventListener("transitionend", onEnd); } };
    if (shell) shell.addEventListener("transitionend", onEnd);
    setTimeout(reanchor, 260);
  }
}

function closeDetail() {
  state.selected = null;
  document.body.classList.remove("detail-open");
  if (history.replaceState) history.replaceState(null, "", location.pathname + location.search);
  else location.hash = "";
  reflectSelection();
}

function reflectSelection() {
  document.querySelectorAll(".row").forEach(r => r.setAttribute("aria-selected", r.dataset.uid===state.selected ? "true":"false"));
}

function renderDetail() {
  const root = $("#detailinner");
  if (!state.selected || !INDEX[state.selected]) { root.innerHTML = ""; return; }
  const { entry:e, site } = INDEX[state.selected];
  const dl = deadlineInfo(e.deadline);
  const noteHtml = e.note
    ? `<div class="d-llm"><span class="lab">Why it matters</span><p>${esc(e.note)}</p></div>`
    : (e.summary ? `<div class="d-llm muted"><span class="lab">Summary (no AI note)</span><p>${esc(e.summary)}</p></div>` : "");
  root.innerHTML =
    `<div class="d-eyebrow">
       <span class="d-source">${esc(site.name)}</span>
       <span class="d-country">${esc(e.country)}</span>
       ${e.is_new ? '<span class="d-newdot">New since last check</span>' : ''}
     </div>
     <h2 class="d-title">${esc(e.title)}</h2>
     <div class="d-badges">
       <span class="d-sev ${e.severity}">${e.severity} impact</span>
       ${dl ? `<span class="d-deadline ${dl.cls}">${dl.label}</span>` : ''}
       <button class="d-share" id="sharebtn" type="button">Copy link</button>
     </div>
     ${noteHtml}
     <div class="d-meta">
       <h3>Notification details</h3>
       <dl class="meta">
         <dt>Notifying member</dt><dd>${esc(e.country)}</dd>
         <dt>Distribution date</dt><dd>${esc(e.seen_date) || "—"}</dd>
         <dt>Comment deadline</dt><dd>${esc(e.deadline) || "—"}</dd>
         <dt>Document symbol(s)</dt><dd>${esc(e.symbols) || "—"}</dd>
         <dt>Products</dt><dd>${esc(e.products) || "—"}</dd>
         <dt>Objectives</dt><dd>${esc(e.objectives) || "—"}</dd>
       </dl>
     </div>
     <div class="d-links">
       ${e.link ? `<a class="primary" href="${esc(e.link)}" target="_blank" rel="noopener">More information →</a>` : ''}
       ${e.extra ? `<a class="secondary" href="${esc(e.extra)}" target="_blank" rel="noopener">Notified document (PDF)</a>` : ''}
     </div>`;
  const sb = $("#sharebtn");
  if (sb) sb.addEventListener("click", () => {
    const url = location.href.split("#")[0] + "#uid=" + encodeURIComponent(e.uid);
    navigator.clipboard?.writeText(url).then(()=>{ sb.textContent="Copied!"; setTimeout(()=>sb.textContent="Copy link",1400); }).catch(()=>{ sb.textContent=url; });
  });
  const pane = $("#detailpane"); if (pane) pane.scrollTop = 0;
}

function scrollSelectedIntoView() {
  const el = document.querySelector(`.row[data-uid="${CSS.escape(state.selected||"")}"]`);
  if (el) el.scrollIntoView({ block:"nearest" });
}

function wireControls() {
  $("#q").addEventListener("input", e=>{ state.q=e.target.value; renderList(); });
  $("#country").addEventListener("change", e=>{ state.country=e.target.value; renderList(); });
  $("#sevfilter").addEventListener("click", e=>{ const b=e.target.closest("button"); if(!b) return; state.sev=b.dataset.sev; [...e.currentTarget.children].forEach(x=>x.setAttribute("aria-pressed", x===b)); renderList(); });
  $("#closebtn").addEventListener("click", closeDetail);
  document.addEventListener("keydown", e=>{ if(e.key==="Escape" && state.selected) closeDetail(); });
  const tb = $("#theme"); tb.addEventListener("click", ()=>{ const d=document.body.dataset.theme==="dark"; document.body.dataset.theme=d?"light":"dark"; tb.textContent=d?"Dark":"Light"; });
}

function applyData(raw) {
  DATA = {
    generated_at: raw.generated_at || "",
    sites: (raw.sites || []).map(s => ({
      id: s.id, name: s.name,
      entries: (s.new_entries || []).map(adaptEntry),
    })),
  };
  INDEX = {};
  DATA.sites.forEach(s => s.entries.forEach(e => { INDEX[e.uid] = { entry:e, site:s }; }));

  $("#subhead").innerHTML = `<b>${totalNew()}</b> new · ${DATA.sites.length} source${DATA.sites.length===1?"":"s"} · ${esc(DATA.generated_at)}`;
  const csel = $("#country");
  csel.innerHTML = '<option value="all">All countries</option>';
  allCountries().forEach(c=>{ const o=document.createElement("option"); o.value=c; o.textContent=c; csel.appendChild(o); });

  renderList();

  const m = location.hash.match(/uid=([^&]+)/);
  if (m) {
    const uid = decodeURIComponent(m[1]);
    if (INDEX[uid]) {
      state.q=""; state.sev="all"; state.country="all";
      $("#q").value=""; csel.value="all";
      [...$("#sevfilter").children].forEach(x=>x.setAttribute("aria-pressed", x.dataset.sev==="all"));
      renderList(); select(uid); scrollSelectedIntoView();
    }
  }
}

async function init() {
  wireControls();
  try {
    const resp = await fetch("report_data.json", { cache: "no-cache" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const raw = await resp.json();
    applyData(raw);
  } catch (err) {
    const st = $("#status");
    if (st) st.outerHTML = `<div class="status error">Could not load report data (${esc(err.message)}).</div>`;
    $("#subhead").textContent = "Failed to load";
  }
}
init();
</script>
</body>
</html>
